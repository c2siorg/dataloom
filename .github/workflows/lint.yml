name: Lint

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: >-
    ci-${{
      github.event_name == 'pull_request'
        && format('pr-{0}', github.event.pull_request.number)
        || github.ref
    }}
  cancel-in-progress: true

# Fork code is checked out and executed here (npm ci lifecycle scripts, the
# eslint config, uv build backends), so this workflow runs on `pull_request`
# with a read-only token and no secrets. Commenting needs write access and
# therefore lives in lint-comment.yml, which never checks out PR code.
permissions:
  contents: read

jobs:
  frontend-lint:
    name: Frontend Lint
    runs-on: ubuntu-latest
    outputs:
      eslint: ${{ steps.eslint.outcome }}
      prettier: ${{ steps.prettier.outcome }}
      typecheck: ${{ steps.typecheck.outcome }}
    defaults:
      run:
        working-directory: dataloom-frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: dataloom-frontend/package-lock.json
      - run: npm ci

      - name: ESLint
        id: eslint
        continue-on-error: true
        run: npx eslint . --ext js,jsx,ts,tsx --report-unused-disable-directives --max-warnings 0

      - name: Prettier
        id: prettier
        continue-on-error: true
        run: npx prettier --check "src/**/*.{js,jsx,ts,tsx,css,md}"

      - name: TypeScript
        id: typecheck
        continue-on-error: true
        run: npx tsc --noEmit

      - name: Fail if checks failed
        if: steps.eslint.outcome == 'failure' || steps.prettier.outcome == 'failure' || steps.typecheck.outcome == 'failure'
        run: exit 1

  backend-lint:
    name: Backend Lint
    runs-on: ubuntu-latest
    outputs:
      ruff-lint: ${{ steps.ruff-lint.outcome }}
      ruff-format: ${{ steps.ruff-format.outcome }}
    defaults:
      run:
        working-directory: dataloom-backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: uv sync --frozen

      - name: Ruff lint
        id: ruff-lint
        continue-on-error: true
        run: uv run ruff check .

      - name: Ruff format
        id: ruff-format
        continue-on-error: true
        run: uv run ruff format --check .

      - name: Fail if checks failed
        if: steps.ruff-lint.outcome == 'failure' || steps.ruff-format.outcome == 'failure'
        run: exit 1

  rebase-check:
    name: Rebase Check
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      behind_count: ${{ steps.rebase.outputs.behind_count }}
      merge_commits: ${{ steps.rebase.outputs.merge_commits }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch PR head
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: git fetch origin "+refs/pull/${PR_NUMBER}/head:refs/remotes/origin/pr-head"

      - name: Check rebase status
        id: rebase
        run: |
          MERGE_COMMITS=$(git log --merges origin/main..origin/pr-head --oneline)
          BEHIND_COUNT=$(git rev-list --count origin/pr-head..origin/main)

          echo "merge_commits<<EOF" >> "$GITHUB_OUTPUT"
          echo "$MERGE_COMMITS" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "behind_count=$BEHIND_COUNT" >> "$GITHUB_OUTPUT"

  report:
    name: Report
    needs: [frontend-lint, backend-lint, rebase-check]
    if: always() && github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      # Results are handed to lint-comment.yml as a data-only artifact. That
      # workflow holds the write permission this one deliberately lacks.
      - name: Write report
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_COMMITS: ${{ github.event.pull_request.commits }}
          ESLINT: ${{ needs.frontend-lint.outputs.eslint }}
          PRETTIER: ${{ needs.frontend-lint.outputs.prettier }}
          TYPECHECK: ${{ needs.frontend-lint.outputs.typecheck }}
          RUFF_LINT: ${{ needs.backend-lint.outputs.ruff-lint }}
          RUFF_FORMAT: ${{ needs.backend-lint.outputs.ruff-format }}
          BEHIND_COUNT: ${{ needs.rebase-check.outputs.behind_count }}
          MERGE_COMMITS: ${{ needs.rebase-check.outputs.merge_commits }}
        run: |
          jq -n \
            --arg pr "$PR_NUMBER" \
            --arg pr_commits "$PR_COMMITS" \
            --arg eslint "$ESLINT" \
            --arg prettier "$PRETTIER" \
            --arg typecheck "$TYPECHECK" \
            --arg ruff_lint "$RUFF_LINT" \
            --arg ruff_format "$RUFF_FORMAT" \
            --arg behind_count "$BEHIND_COUNT" \
            --arg merge_commits "$MERGE_COMMITS" \
            '{
              pr: $pr,
              pr_commits: $pr_commits,
              eslint: $eslint,
              prettier: $prettier,
              typecheck: $typecheck,
              ruff_lint: $ruff_lint,
              ruff_format: $ruff_format,
              behind_count: $behind_count,
              merge_commits: $merge_commits
            }' > report.json

      - uses: actions/upload-artifact@v4
        with:
          name: pr-lint-report
          path: report.json
          retention-days: 1
